modified: '2026-03-13'
specificationVersion: '0.18'
tags:
  - Google Cloud
  - CDN
  - Content Delivery
  - Caching
  - Networking
apis:
  - name: Google Cloud CDN API
    description: >-
      The Cloud CDN API enables programmatic management of CDN-enabled backend
      services, URL maps, cache invalidation, and edge caching policies through
      the Compute Engine API, providing control over content distribution and
      caching behavior.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/cdn/docs
    baseURL: https://compute.googleapis.com
    tags:
      - Backend Services
      - URL Maps
      - Cache Invalidation
      - Edge Caching
      - Load Balancing
    properties:
      - type: OpenAPI
        url: openapi/cdn-openapi.yml
      - type: JSONSchema
        url: json-schema/cdn-backendservice.json
