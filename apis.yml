name: Google Cloud CDN
description: >-
  Google Cloud CDN (Content Delivery Network) uses Google's globally distributed
  edge points of presence to cache HTTP(S) load-balanced content close to users.
  It accelerates content delivery, reduces serving costs, and improves
  availability by leveraging Google's global network infrastructure for fast,
  reliable content distribution.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
